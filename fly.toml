# Fly.io 应用名全局唯一；若已被占用，请改成别的名字并执行: fly apps create <新名字>
# 文档：https://fly.io/docs/languages-and-frameworks/dockerfile/

app = "img-lossless-tool"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  IMG_TOOL_CLOUD = "1"
  PORT = "8080"
