# 最优默认：公网跑在 Fly.io；推送即部署（需同时配置变量 + Secret，见 README）
# 仓库 Variables：ENABLE_FLY_DEPLOY = true
# 仓库 Secrets：FLY_API_TOKEN（本机 fly auth token）
# 手动运行本工作流时不受 ENABLE_FLY_DEPLOY 限制（仍需要 FLY_API_TOKEN）

name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_FLY_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
