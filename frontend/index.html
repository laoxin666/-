<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>图片压缩与格式转化</title>
    <link id="appStyle" rel="stylesheet" href="./style.css" />
    <script>
      (function applyAssetVersion() {
        const params = new URLSearchParams(window.location.search);
        const v = params.get("_v") || String(Date.now());
        const style = document.getElementById("appStyle");
        if (style) style.href = "./style.css?_v=" + encodeURIComponent(v);
        window.__assetVersion = v;
      })();
    </script>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <div class="eyebrow brand-pill">
            <span class="ghost-logo" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img">
                <defs>
                  <linearGradient id="ghostDream" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7a7dff" />
                    <stop offset="55%" stop-color="#58c6ff" />
                    <stop offset="100%" stop-color="#a16bff" />
                  </linearGradient>
                </defs>
                <path
                  d="M32 8c-11.6 0-21 8.9-21 19.9v24.8c0 1.4 1.6 2.2 2.8 1.4l5.2-3.7 5.2 3.7c1 .7 2.3.7 3.3 0l4.5-3.2 4.5 3.2c1 .7 2.3.7 3.3 0l5.2-3.7 5.2 3.7c1.2.8 2.8 0 2.8-1.4V27.9C53 16.9 43.6 8 32 8z"
                  fill="url(#ghostDream)"
                />
                <circle cx="24" cy="29" r="3.6" fill="#ffffff" />
                <circle cx="40" cy="29" r="3.6" fill="#ffffff" />
                <path d="M22 39c3 3 17 3 20 0" fill="none" stroke="#eaf6ff" stroke-width="2.4" stroke-linecap="round" />
              </svg>
            </span>
            <span>PixelForge Studio</span>
          </div>
          <h1>图片压缩与格式转化</h1>
          <p class="hint">
            纯前端版本，所有处理都在浏览器本地完成。JPEG / WebP 在保持原始像素尺寸时优先使用
            <strong>MozJPEG / libwebp（WASM）</strong>编码，通常比浏览器内置编码更小、更容易达标。
          </p>
        </div>
        <div class="hero-badge">商业级本地处理</div>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>工作台</h2>
          <div class="top-controls">
            <select id="presetSelect">
              <option value="">手动设置</option>
              <option value="social">社媒发布</option>
              <option value="ecommerce">电商图</option>
              <option value="archive">归档备份</option>
            </select>
          </div>
        </div>

        <div class="workbench-grid">
          <div class="workbench-col">
            <div id="dropZone" class="drop-zone">
              <div class="drop-inner">
                <strong>拖拽图片或文件夹到这里</strong>
                <div class="drop-hint">或</div>
                <button id="pickFilesBtn" class="btn btn--primary drop-action" type="button">选择文件</button>
                <input
                  id="imagesInput"
                  class="input-hidden"
                  type="file"
                  multiple
                  accept=".png,.jpg,.jpeg,.webp,.bmp,.gif,.tif,.tiff"
                />
                <div class="drop-hint" id="fileMeta">未选择文件</div>
              </div>
              <button id="clearAllBtn" class="btn btn--secondary drop-clear-btn" type="button">一键清空</button>
            </div>
            <div class="preview-tools">
              <span class="summary">已选预览</span>
            </div>
            <div id="previewGrid" class="preview-grid"></div>
            <div id="previewMore" class="summary"></div>
          </div>

          <div class="workbench-col">
            <div class="stack-fields">
              <div>
                <label>处理模式</label>
                <select id="modeSelect">
                  <option value="compress">无损压缩</option>
                  <option value="convert">格式转换</option>
                </select>
              </div>
              <div id="compressToWrap">
                <label>压缩输出格式</label>
                <select id="compressToSelect">
                  <option value="same">保持原格式</option>
                  <option value="jpeg">jpeg</option>
                  <option value="webp">webp</option>
                  <option value="png">png</option>
                  <option value="tiff">tiff</option>
                  <option value="bmp">bmp</option>
                  <option value="gif">gif</option>
                </select>
              </div>
              <div id="targetWrap" class="hidden">
                <label>目标格式</label>
                <select id="targetSelect">
                  <option value="jpeg">jpeg</option>
                  <option value="webp">webp</option>
                  <option value="png">png</option>
                  <option value="tiff">tiff</option>
                  <option value="bmp">bmp</option>
                  <option value="gif">gif</option>
                </select>
              </div>
              <div>
                <label>目标体积(KB)</label>
                <input id="targetSizeInput" type="number" min="1" step="1" placeholder="例如 300" />
              </div>
            </div>
          </div>
        </div>

        <div class="action-bar">
          <div class="status-wrap">
            <span class="status-dot"></span>
            <span id="statusText">等待任务</span>
          </div>
          <div class="action-group">
            <button id="runBtn" class="btn btn--primary" type="button">开始处理</button>
            <button id="downloadBtn" class="btn btn--secondary" type="button" disabled>下载 ZIP</button>
          </div>
        </div>
        <div class="progress"><div id="progressBar"></div></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>处理结果</h2>
          <div class="top-controls">
            <select id="resultFilter">
              <option value="all">显示全部</option>
              <option value="met">仅达标</option>
              <option value="unmet">仅未达标</option>
            </select>
            <button id="retryFailedBtn" class="btn btn--secondary" type="button">重试失败项</button>
            <button id="exportCsvBtn" class="btn btn--secondary" type="button">导出 CSV</button>
          </div>
        </div>
        <div class="result-cards">
          <div class="result-card"><div class="k">文件数</div><div class="v" id="sumCount">0</div></div>
          <div class="result-card"><div class="k">原始体积</div><div class="v" id="sumBefore">0 KB</div></div>
          <div class="result-card"><div class="k">输出体积</div><div class="v" id="sumAfter">0 KB</div></div>
          <div class="result-card"><div class="k">节省比例</div><div class="v" id="sumRatio">0%</div></div>
        </div>
        <div class="summary" id="summaryText">暂无结果</div>
        <table>
          <thead>
            <tr>
              <th>文件</th>
              <th>原始</th>
              <th>输出</th>
              <th>达标</th>
              <th>说明</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script type="module">
      const v = window.__assetVersion || String(Date.now());
      import("./app.js?_v=" + encodeURIComponent(v));
    </script>
  </body>
</html>
